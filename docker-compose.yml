services:
  postgres:
    image: postgres:16-alpine
    container_name: pet-record-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pet_records
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pet_records_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pet_records"]
      interval: 5s
      timeout: 5s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: pet-record-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: example@examplepetrecords.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pet_records_pgadmin:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pet_records_pgdata:
  pet_records_pgadmin:
